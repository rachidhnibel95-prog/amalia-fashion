<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMALIA Fashion</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .hero { background: url('hero-image.jpg') no-repeat center center/cover; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .categories, .products, .heritage, .newsletter, .footer { padding: 20px; }
        .category, .product { margin: 10px; display: inline-block; width: 30%; }
        .heritage { background: #f4f4f4; }
        .newsletter input[type="email"] { width: 70%; padding: 10px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to AMALIA Fashion</h1>
    </div>
    <div class="categories">
        <h2>Categories</h2>
        <div class="category">Women's Fashion</div>
        <div class="category">Men's Fashion</div>
        <div class="category">Kids' Fashion</div>
    </div>
    <div class="products">
        <h2>Featured Products</h2>
        <div class="product">Product 1</div>
        <div class="product">Product 2</div>
        <div class="product">Product 3</div>
    </div>
    <div class="heritage">
        <h2>Our Heritage</h2>
        <p>We have a rich history of providing quality fashion...</p>
    </div>
    <div class="newsletter">
        <h2>Subscribe to our Newsletter</h2>
        <input type="email" placeholder="Your email address" />
        <button>Subscribe</button>
    </div>
    <div class="footer">
        <p>© 2026 AMALIA Fashion. All rights reserved.</p>
    </div>
</body>
</html>
